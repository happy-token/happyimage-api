# 本地部署测试配置
# docker compose -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:17
    container_name: happyimage-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: happyimage
      POSTGRES_PASSWORD: happyimage-local-dev
      POSTGRES_DB: happyimage
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happyimage -d happyimage"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  happyimage-api:
    image: happyimage-api:local
    container_name: happyimage-api-test
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:rw
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: "postgresql://happyimage:happyimage-local-dev@postgres:5432/happyimage"
      HAPPYIMAGE_SESSION_SECRET: "local-test-secret-do-not-use-in-prod"
      HAPPYIMAGE_FRONTEND_BASE_URL: "http://localhost:3000"
      HAPPYIMAGE_API_BASE_URL: "http://localhost:8000"
      HAPPYIMAGE_CORS_ORIGINS: "http://localhost:3000"
      HAPPYIMAGE_REGISTRATION_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health?format=json', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  happyimage-web:
    image: happyimage-web:local
    container_name: happyimage-web-test
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
    depends_on:
      happyimage-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pgdata:
