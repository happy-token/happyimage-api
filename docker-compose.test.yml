# 本地部署测试配置
# docker compose -f docker-compose.test.yml up -d

services:
  postgres:
    image: postgres:17
    container_name: happytoken-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: happytoken
      POSTGRES_PASSWORD: happytoken-local-dev
      POSTGRES_DB: happytoken
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happytoken -d happytoken"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  happytoken-api:
    image: happytoken-api:local
    container_name: happytoken-api-test
    restart: unless-stopped
    ports:
      - "${HAPPYTOKEN_TEST_API_PORT:-8000}:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:rw
    environment:
      STORAGE_BACKEND: postgres
      DATABASE_URL: "postgresql://happytoken:happytoken-local-dev@postgres:5432/happytoken"
      HAPPYTOKEN_SESSION_SECRET: "local-test-secret-do-not-use-in-prod"
      HAPPYTOKEN_FRONTEND_BASE_URL: "http://localhost:3000"
      HAPPYTOKEN_API_BASE_URL: "http://localhost:8000"
      HAPPYTOKEN_CORS_ORIGINS: "http://localhost:3000"
      HAPPYTOKEN_REGISTRATION_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health?format=json', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  happytoken-web:
    image: happytoken-web:local
    container_name: happytoken-web-test
    restart: unless-stopped
    ports:
      - "${HAPPYTOKEN_TEST_WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      BACKEND_URL: "http://happytoken-api:80"
      MODEL_BACKEND_URL: "http://happytoken-api:80"
    depends_on:
      happytoken-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pgdata:
