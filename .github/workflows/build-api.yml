# 后端 Docker 镜像构建并推送到 Docker Hub
# 触发条件：main 分支上后端代码有变更时自动构建

name: Build and Push API Image

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'services/**'
      - 'utils/**'
      - 'main.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签（留空自动生成）'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate metadata
        id: meta
        run: |
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/happyimage-api"
          TAG="${{ inputs.tag || github.sha }}"
          echo "image=${IMAGE_NAME}" | tee -a "$GITHUB_OUTPUT"
          echo "tag=${TAG}" | tee -a "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_NAME}:latest" | tee -a "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.latest_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
