services:
  happytoken-api:
    image: ${HAPPYTOKEN_API_IMAGE:-ghcr.io/happy-token/happyimage-api:latest}
    container_name: happytoken-api
    restart: unless-stopped
    ports:
      - "${HAPPYTOKEN_API_PORT:-127.0.0.1:8001}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../../data/api:/app/data
      - ../../../data/config.json:/app/config.json:rw
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-json}
      DATABASE_URL: ${DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1/health?format=json', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  happytoken-web:
    image: ${HAPPYTOKEN_WEB_IMAGE:-happytoken-web:hs}
    container_name: happytoken-web
    restart: unless-stopped
    ports:
      - "${HAPPYTOKEN_WEB_PORT:-3000}:3000"
    volumes:
      - ../../../data/seed-gallery:/app/web/public/seed-gallery:ro
    environment:
      BACKEND_URL: "http://happytoken-api:80"
    depends_on:
      happytoken-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
